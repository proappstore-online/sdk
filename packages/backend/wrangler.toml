name = "proappstore-api"
main = "src/index.ts"
compatibility_date = "2026-01-01"
compatibility_flags = ["nodejs_compat"]
workers_dev = true

[vars]
FAS_API_BASE = "https://api.freeappstore.online"
CF_ACCOUNT_ID = "c1089bfcc43c1c6c2aa89e584e86f0bc"
VAPID_PUBLIC_KEY = "BPg6E92QAOhdcif_HckOEGY6mL03VKWNQ3CS1xQX5q59fXURI1xCGwwBr4Vsv7gn3TXIGSJquJwvHGYRbMcAQc0"
# Comma-separated `gh:<id>` strings allowed to approve/reject submissions.
ADMIN_GITHUB_IDS = "gh:2824906"

[[d1_databases]]
binding = "DB"
database_name = "pas"
database_id = "585bbda3-0016-42ad-a53d-c089f1864fcb"
migrations_dir = "../../migrations"

[[r2_buckets]]
binding = "STORAGE"
bucket_name = "pas-storage"

# Workers AI binding — backs the app.ai SDK primitive.
# Free quota included with Workers Paid; pay-as-you-go beyond.
[ai]
binding = "AI"

[[routes]]
pattern = "api.proappstore.online/*"
zone_name = "proappstore.online"

# Service binding to FAS admin Worker — handles the cross-store provisioning
# steps (GitHub repo, CF Pages, DNS, custom domain, storefront registry) so
# PAS reuses the working FAS provisioner instead of duplicating it. PAS's
# /v1/provision still does the PAS-specific D1 + data Worker steps locally.
# Calls go Worker→Worker on the same CF account and bypass CF Access.
[[services]]
binding = "ADMIN"
service = "freeappstore-admin"

# Secrets (set via `wrangler secret put`):
#   CF_API_TOKEN                    (for provisioning D1/Pages/Workers)
#   STRIPE_SECRET_KEY
#   STRIPE_WEBHOOK_SECRET
#   STRIPE_PRO_MONTHLY_PRICE_ID     (the live Stripe price for $9/mo Pro;
#                                    until set, GET /v1/pricing returns null
#                                    and the Console hides the Upgrade button)
#   SESSION_SIGNING_KEY
#   VAPID_PRIVATE_KEY               (for Web Push notifications)
