name = "proappstore-api"
main = "src/index.ts"
compatibility_date = "2026-01-01"
compatibility_flags = ["nodejs_compat"]
workers_dev = true

[vars]
FAS_API_BASE = "https://api.freeappstore.online"
CF_ACCOUNT_ID = "c1089bfcc43c1c6c2aa89e584e86f0bc"

[[d1_databases]]
binding = "DB"
database_name = "pas"
database_id = "585bbda3-0016-42ad-a53d-c089f1864fcb"
migrations_dir = "../../migrations"

[[r2_buckets]]
binding = "STORAGE"
bucket_name = "pas-storage"

[[routes]]
pattern = "api.proappstore.online/*"
zone_name = "proappstore.online"

# Secrets (set via `wrangler secret put`):
#   CF_API_TOKEN          (for provisioning D1/Pages/Workers)
#   STRIPE_SECRET_KEY
#   STRIPE_WEBHOOK_SECRET
#   SESSION_SIGNING_KEY
